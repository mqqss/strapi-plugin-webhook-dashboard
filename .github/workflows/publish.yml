name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Check npm version availability
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$PACKAGE_VERSION already exists on npm"
            exit 1
          fi

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Verify package
        run: npm run verify

      - name: Verify no sourcemaps are packaged
        shell: bash
        run: |
          if find dist -type f -name '*.map' | grep -q .; then
            find dist -type f -name '*.map'
            exit 1
          fi
          if grep -R "sourceMappingURL" dist --include='*.d.ts'; then
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
